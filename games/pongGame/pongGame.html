<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAdriano Dev - Pong Game</title>

    
    
    <!-- Box Icons library -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../css/style.css">

    <!-- P5.js Game Libraries -->
    <script src="p5.min.js"></script>
    <script src="p5.dom.min.js"></script>
    <script src="p5.sound.min.js"></script>
</head>

<body>

    <style>
        .game-shell {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: fit-content;
            margin: 0 auto;
        }

        .game-audio-toggle {
            margin: 1rem 0 0 0;
            padding: 0.6rem 1rem;
            border: 1px solid #ffffff40;
            border-radius: 0.6rem;
            background: #1f242d;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
        }

        .game-audio-toggle:hover {
            background: #323946;
        }
    </style>

    <!-- header design -->
    <header class="header">
        <a href="#" class="logo">RAdriano DEV</a>

        <i class='bx bx-menu' id="menu-icon"></i>

        <nav class="navbar">
            <a href="../../index.html" class="active">Home</a>
            <a href="../../index.html#about">About</a>
            <a href="../../index.html#services">Services</a>
            <a href="../../index.html#portfolio">Portfolio</a>
            <a href="../../index.html#contact">Contact</a>
        </nav>
    </header>

    <main>
        <!-- home section design -->
        <div class="home-game" id="home-game">
            <div class="game-shell">
                <div id="pongGame">
                    <script src="pongGame.js"></script>
                    <script src="p5.collide2d.js"></script>
                </div>
                <button id="muteButton" class="game-audio-toggle" type="button" aria-label="Mute game audio">🔊 Audio: On</button>
            </div>

        </div>

    </main>

    <!-- footer design -->

        <div class="footer-text">

        </div>
 
        <div class="footer-iconTop">
            <a href="../../index.html#home"><i class='bx bx-up-arrow-alt'></i></a>
        </div>
    </footer> -->


    <!-- Scroll Reveal library -->
    <script src="https://unpkg.com/scrollreveal"></script>

    <!-- Typed.js library -->
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>

    <!-- Custom JavaScript -->
    <script src="../../js/script.js"></script>
    <script>
        (function () {
            const muteButton = document.getElementById("muteButton");
            let isMuted = false;

            function updateButtonLabel() {
                muteButton.textContent = isMuted ? "🔇 Audio: Muted" : "🔊 Audio: On";
                muteButton.setAttribute("aria-label", isMuted ? "Unmute game audio" : "Mute game audio");
            }

            muteButton.addEventListener("click", function () {
                isMuted = !isMuted;
                masterVolume(isMuted ? 0 : 1);
                updateButtonLabel();
            });

            updateButtonLabel();
        })();
    </script>
</body>

</html>
